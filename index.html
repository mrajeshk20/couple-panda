<style>

<script>
const MECHS = ['Ravi Kumar', 'Suresh Yadav', 'Amit Patel', 'Vikram Singh', 'Deepak Sharma'];
const SVCS = [
  {id:'alignment',name:'Wheel Alignment',price:1200,type:'toggle',hsn:'998714',gst:18,minutes:30},
  {id:'balancing',name:'Wheel Balancing',price:400,type:'grid',hsn:'998714',gst:18,aprice:600,minutes:20},
  {id:'fitting',name:'Tyre Fitting',price:200,type:'grid',hsn:'998714',gst:18,aprice:350,minutes:20},
  {id:'nitrogen',name:'Nitrogen Gas',price:50,type:'count',hsn:'998714',gst:18,minutes:5},
  {id:'puncture',name:'Puncture Repair',price:150,type:'visual',hsn:'998714',gst:18,minutes:15},
  {id:'patch',name:'Tyre Patch',price:200,type:'stepper',hsn:'998714',gst:18,minutes:10}
];
const SIZES = ['12', '13', '14', '15', '16', '17', '18', '19'];
const INV = [
  {id:1,sz:'155/80 R13',mdl:'ZVTV',mfg:'MRF',pr:3200,stk:8,hsn:'40111000'},
  {id:2,sz:'165/80 R14',mdl:'ZLX',mfg:'MRF',pr:3800,stk:12,hsn:'40111000'},
  {id:3,sz:'185/65 R15',mdl:'Ecopia',mfg:'Bridgestone',pr:5200,stk:6,hsn:'40111000'},
  {id:4,sz:'195/65 R15',mdl:'Potenza',mfg:'Bridgestone',pr:5800,stk:10,hsn:'40111000'},
  {id:5,sz:'205/55 R16',mdl:'Primacy',mfg:'Michelin',pr:7200,stk:4,hsn:'40111000'},
  {id:6,sz:'215/60 R16',mdl:'Energy',mfg:'Michelin',pr:7800,stk:7,hsn:'40111000'},
  {id:7,sz:'225/55 R17',mdl:'Cinturato',mfg:'Pirelli',pr:9500,stk:3,hsn:'40111000'},
  {id:8,sz:'245/45 R18',mdl:'Eagle',mfg:'Goodyear',pr:14200,stk:2,hsn:'40111000'}
];

let custs = [
  {id:1,name:'Rajesh Kumar',ph:'9876543210',veh:'Maruti Swift',reg:'DL01AB1234',km:45000},
  {id:2,name:'Priya Sharma',ph:'9876543211',veh:'Hyundai Creta',reg:'DL02CD5678',km:32000},
  {id:3,name:'Mohammed Ali',ph:'9876543212',veh:'Toyota Fortuner',reg:'DL03EF9012',km:67000},
  {id:4,name:'Sneha Patel',ph:'9876543213',veh:'Honda City',reg:'DL04GH3456',km:28000},
  {id:5,name:'Vikram Reddy',ph:'9876543214',veh:'Mahindra XUV500',reg:'DL05IJ7890',km:54000}
];

let jobs = [
  {id:1001,cid:1,st:'waiting',svcs:['alignment'],svcCfg:{alignment:{en:true}},tyres:[],mech:'Ravi Kumar',notes:'',at:new Date(Date.now()-3600000),memo:false,addS:[],veh:'Maruti Swift',reg:'DL01AB1234',recs:[]},
  {id:1002,cid:2,st:'in-progress',svcs:['alignment','balancing'],svcCfg:{alignment:{en:true,mech:'Suresh Yadav'},balancing:{en:true,alloy:false,size:'15',mech:'Suresh Yadav'}},tyres:[{...INV[3],qty:4}],mech:'Suresh Yadav',notes:'Front left worn',at:new Date(Date.now()-7200000),memo:false,addS:[],veh:'Hyundai Creta',reg:'DL02CD5678',recs:[]},
  {id:1003,cid:3,st:'in-progress',svcs:['balancing','nitrogen'],svcCfg:{balancing:{en:true,alloy:true,size:'17',mech:'Amit Patel'},nitrogen:{en:true,count:4,mech:'Amit Patel'}},tyres:[],mech:'Amit Patel',notes:'',at:new Date(Date.now()-5400000),memo:false,addS:[],veh:'Toyota Fortuner',reg:'DL03EF9012',recs:[]},
  {id:1004,cid:5,st:'ready',svcs:['alignment','puncture'],svcCfg:{alignment:{en:true,mech:'Vikram Singh'},puncture:{en:true,positions:['RL','RR'],mech:'Vikram Singh'}},tyres:[],mech:'Vikram Singh',notes:'Two punctures rear',at:new Date(Date.now()-9000000),memo:false,addS:[],veh:'Mahindra XUV500',reg:'DL05IJ7890',recs:[]},
  {id:1005,cid:4,st:'completed',svcs:['fitting'],svcCfg:{fitting:{en:true,alloy:false,size:'15',mech:'Deepak Sharma'}},tyres:[{...INV[2],qty:4}],mech:'Deepak Sharma',notes:'',at:new Date(Date.now()-14400000),memo:false,addS:[],veh:'Honda City',reg:'DL04GH3456',recs:[]}
];

let nxJ = 1006, nxC = 6;
let S = {
  view:'dashboard',
  step:1,
  ej:null,
  memo:false,
  nj:makeNewJob(),
  tq:1,
  selTyre:null,
  invF:'',
  cstF:''
};

function makeNewJob() {
  const svc = {};
  SVCS.forEach(s => {
    svc[s.id] = {en:false,alloy:false,size:null,count:0,positions:[],mech:''};
  });
  return {cid:null,nm:'',ph:'',veh:'',reg:'',km:'',svc,tyres:[],mech:'',notes:'',recs:[],addS:[]};
}

const fc = n => '₹' + Number(n || 0).toLocaleString('en-IN');
const ft = d => new Date(d).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
const fd = d => new Date(d).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});

function toast(m, t='ok') {
  const c = {
    ok:'background:#10b981;color:#fff',
    err:'background:#ef4444;color:#fff',
    info:'background:#06b6d4;color:#fff'
  };
  const e = document.createElement('div');
  e.className = 'toast';
  e.style.cssText = c[t];
  e.innerHTML = '<i class="fas fa-' + (t === 'ok' ? 'check-circle' : t === 'err' ? 'times-circle' : 'info-circle') + ' mr-2"></i>' + m;
  document.getElementById('toasts').appendChild(e);
  setTimeout(() => {
    e.style.opacity = '0';
    e.style.transition = 'opacity .3s';
    setTimeout(() => e.remove(), 300);
  }, 3000);
}

function normalizeSvcCfg(id, cfg = {}) {
  return {
    en: !!cfg.en,
    alloy: !!cfg.alloy,
    size: cfg.size || null,
    count: Number(cfg.count || 0),
    positions: Array.isArray(cfg.positions) ? [...cfg.positions] : [],
    mech: cfg.mech || ''
  };
}

function svcPrice(id, cfg = {}) {
  const s = SVCS.find(x => x.id === id);
  if (!s) return 0;
  const c = normalizeSvcCfg(id, cfg);
  if (id === 'alignment') return s.price;
  if (id === 'balancing' || id === 'fitting') return c.alloy ? s.aprice : s.price;
  if (id === 'nitrogen') return s.price * c.count;
  if (id === 'puncture') return s.price * c.positions.length;
  if (id === 'patch') return s.price * c.count;
  return s.price;
}

function calc(job) {
  let ss = 0, ts = 0, sg = 0, tg = 0;
  if (job.svc) {
    Object.entries(job.svc).forEach(([k, v]) => {
      if (v && v.en) {
        const p = svcPrice(k, v);
        const s = SVCS.find(x => x.id === k);
        if (s) {
          ss += p;
          sg += p * (s.gst / 100);
        }
      }
    });
  } else if (job.svcs && Array.isArray(job.svcs)) {
    job.svcs.forEach(k => {
      const s = SVCS.find(x => x.id === k);
      const cfg = job.svcCfg && job.svcCfg[k] ? job.svcCfg[k] : {en:true};
      if (s) {
        const p = svcPrice(k, cfg);
        ss += p;
        sg += p * (s.gst / 100);
      }
    });
  }
  if (job.addS && job.addS.length) {
    job.addS.forEach(a => {
      const line = Number(a.price || 0) * Number(a.qty || 0);
      ss += line;
      sg += line * 0.18;
    });
  }
  if (job.tyres && job.tyres.length) {
    job.tyres.forEach(t => {
      const line = Number(t.pr || 0) * Number(t.qty || 0);
      ts += line;
      tg += line * 0.28;
    });
  }
  const tot = ss + ts + sg + tg;
  return {ss, ts, sg, tg, tot, cgs:sg/2, sgs:sg/2, cgt:tg/2, sgt:tg/2};
}

function estMinutes(job) {
  let total = 0;
  Object.entries(job.svc || {}).forEach(([id, cfg]) => {
    if (!cfg.en) return;
    const svc = SVCS.find(s => s.id === id);
    if (!svc) return;
    if (id === 'nitrogen' || id === 'patch') total += (cfg.count || 0) * svc.minutes;
    else if (id === 'puncture') total += (cfg.positions || []).length * svc.minutes;
    else total += svc.minutes;
  });
  total += (job.tyres || []).reduce((sum, tyre) => sum + tyre.qty * 10, 0);
  total += (job.addS || []).reduce((sum, item) => sum + item.qty * 10, 0);
  return total;
}

function primaryMechanic(job) {
  const fromCfg = Object.values(job.svc || {}).find(v => v && v.mech);
  if (fromCfg) return fromCfg.mech;
  if (job.svcCfg) {
    const found = Object.values(job.svcCfg).find(v => v && v.mech);
    if (found) return found.mech;
  }
  return job.mech || 'Unassigned';
}

function jobServiceNames(job) {
  if (job.svcs) return job.svcs.map(id => SVCS.find(s => s.id === id)?.name || id);
  return Object.entries(job.svc).filter(([, cfg]) => cfg.en).map(([id]) => SVCS.find(s => s.id === id)?.name || id);
}

function lineItemsFromJob(job) {
  const items = [];
  const svcCfg = job.svcCfg || {};
  (job.svcs || []).forEach(id => {
    const svc = SVCS.find(s => s.id === id);
    if (!svc) return;
    const cfg = normalizeSvcCfg(id, svcCfg[id] || {en:true});
    let qty = 1;
    let rate = svc.price;
    let name = svc.name;
    if (id === 'balancing' || id === 'fitting') {
      name += cfg.alloy ? ' (Alloy)' : '';
      qty = Math.max(1, job.tyres.reduce((sum, tyre) => sum + tyre.qty, 0) || 1);
      rate = qty ? svcPrice(id, cfg) / qty : svcPrice(id, cfg);
    } else if (id === 'nitrogen' || id === 'patch') {
      qty = Math.max(1, cfg.count || 1);
      rate = svc.price;
    } else if (id === 'puncture') {
      qty = Math.max(1, (cfg.positions || []).length || 1);
      rate = svc.price;
    } else {
      rate = svcPrice(id, cfg);
    }
    const base = qty * rate;
    items.push({
      name,
      hsn:svc.hsn,
      qty,
      rate,
      gst:svc.gst,
      total:base + (base * svc.gst / 100),
      base
    });
  });
  (job.addS || []).forEach(a => {
    const qty = Number(a.qty || 1);
    const rate = Number(a.price || 0);
    const base = qty * rate;
    items.push({
      name:a.name || 'Additional Service',
      hsn:'998714',
      qty,
      rate,
      gst:18,
      total:base + (base * 0.18),
      base
    });
  });
  (job.tyres || []).forEach(ty => {
    const qty = Number(ty.qty || 1);
    const rate = Number(ty.pr || 0);
    const base = qty * rate;
    items.push({
      name:`${ty.mfg} ${ty.mdl} (${ty.sz})`,
      hsn:ty.hsn,
      qty,
      rate,
      gst:28,
      total:base + (base * 0.28),
      base
    });
  });
  return items;
}

function render() {
  const m = document.getElementById('mc');
  let h = '';

    case 'dashboard': h = rDash(); break;
    case 'inventory': h = rInv(); break;
    case 'customers': h = rCust(); break;
    case 'reports': h = rRep(); break;
    case 'job-create': h = S.step === 1 ? rJ1() : rJ2(); break;

    ex = `<div class="ml-11 mt-2 flex items-center gap-4 flex-wrap">

      ${mSel(s.id, cfg)}
    </div>`;
  }
  if (on && s.type === 'visual') {

    ex = `<div class="ml-11 mt-2">

          const leftRight = p.endsWith('R') ? 'right-0' : 'left-0';
          return `<div class="tpos ${pos.includes(p) ? 'sel' : ''} absolute ${topBottom} ${leftRight}" data-action="tPos" data-id="${s.id}" data-p="${p}">${p}</div>`;
        }).join('')}
        <div class="absolute inset-0 flex items-center justify-center"><div class="tpos ${pos.includes('SP') ? 'sel' : ''} w-10 h-10 text-[8px]" data-action="tPos" data-id="${s.id}" data-p="SP">SP</div></div>

  if (on && s.type === 'stepper') {
    ex = `<div class="ml-11 mt-2 flex items-center gap-4 flex-wrap">
      <span class="text-xs text-tx2">Count:</span>
      <div class="stp"><button data-action="sCfgN" data-id="${s.id}" data-d="-1">-</button><span>${cfg.count || 0}</span><button data-action="sCfgN" data-id="${s.id}" data-d="1">+</button></div>

  return `<div class="svc ${on ? 'on' : ''}">

}

      <table class="w-full text-sm min-w-[720px]">
        <thead><tr class="border-b border-brd bg-b3"><th class="text-left py-3 px-4 text-xs font-semibold text-tx2">Size</th><th class="text-left py-3 px-4 text-xs font-semibold text-tx2">Model</th><th class="text-left py-3 px-4 text-xs font-semibold text-tx2">Manufacturer</th><th class="text-right py-3 px-4 text-xs font-semibold text-tx2">Price</th><th class="text-right py-3 px-4 text-xs font-semibold text-tx2">Stock</th><th class="text-center py-3 px-4 text-xs font-semibold text-tx2">HSN</th></tr></thead>
        <tbody>
          ${f.map(t => `<tr class="border-b border-brd/50 hover:bg-b3/50"><td class="py-3 px-4 font-mono font-medium text-tx">${t.sz}</td><td class="py-3 px-4 text-tx">${t.mdl}</td><td class="py-3 px-4 text-tx2">${t.mfg}</td><td class="py-3 px-4 text-right font-mono text-tx">${fc(t.pr)}</td><td class="py-3 px-4 text-right font-mono ${t.stk <= 3 ? 'text-err' : 'text-tx'}">${t.stk}${t.stk <= 3 ? ' <i class="fas fa-exclamation-triangle text-[10px]"></i>' : ''}</td><td class="py-3 px-4 text-center text-xs font-mono text-tx2">${t.hsn}</td></tr>`).join('')}

}

function rCust() {
  const q = S.cstF.toLowerCase();
  const f = custs.filter(c => !q || c.name.toLowerCase().includes(q) || c.ph.includes(q) || c.reg.toLowerCase().includes(q));
  return `<div>
    <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
      <div>
        <h1 class="text-xl font-bold text-tx">Customers</h1>
        <p class="text-sm text-tx2">${f.length} customers</p>
      </div>
      <div class="relative">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-tx2 text-sm"></i>
        <input class="inf pl-10 py-2 text-sm w-64" placeholder="Search..." value="${S.cstF}" oninput="S.cstF=this.value;render()">
      </div>
    </div>
    <div class="bg-b2 border border-brd rounded-2xl overflow-hidden overflow-x-auto">
      <table class="w-full text-sm min-w-[720px]">
        <thead><tr class="border-b border-brd bg-b3"><th class="text-left py-3 px-4 text-xs font-semibold text-tx2">Name</th><th class="text-left py-3 px-4 text-xs font-semibold text-tx2">Phone</th><th class="text-left py-3 px-4 text-xs font-semibold text-tx2">Vehicle</th><th class="text-left py-3 px-4 text-xs font-semibold text-tx2">Reg No</th><th class="text-right py-3 px-4 text-xs font-semibold text-tx2">Total Spent</th></tr></thead>
        <tbody>
          ${f.map(c => {
            const sp = jobs.filter(j => j.cid === c.id && j.st === 'completed').reduce((s, j) => s + calc(j).tot, 0);
            return `<tr class="border-b border-brd/50 hover:bg-b3/50 cursor-pointer" data-action="cHist" data-id="${c.id}"><td class="py-3 px-4 font-medium text-tx">${c.name}</td><td class="py-3 px-4 font-mono text-tx2">${c.ph}</td><td class="py-3 px-4 text-tx2">${c.veh}</td><td class="py-3 px-4 font-mono text-tx">${c.reg}</td><td class="py-3 px-4 text-right font-mono text-accent">${fc(Math.round(sp))}</td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function rRep() {
  const cp = jobs.filter(j => j.st === 'completed');
  const rv = cp.reduce((s, j) => s + calc(j).tot, 0);
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    const dj = cp.filter(j => new Date(j.at).toDateString() === d.toDateString());
    days.push({
      date:d.toLocaleDateString('en-IN', {weekday:'short', day:'numeric'}),
      jobs:dj.length,
      rev:dj.reduce((s, j) => s + calc(j).tot, 0)
    });
  }
  const mx = Math.max(...days.map(d => d.rev), 1);
  return `<div>
    <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
      <div><h1 class="text-xl font-bold text-tx">Reports</h1><p class="text-sm text-tx2">Last 7 Days</p></div>
      <button class="bs text-sm py-2" onclick="window.print()"><i class="fas fa-print mr-1"></i>Print</button>
    </div>
    <div class="grid xl:grid-cols-4 md:grid-cols-2 gap-4 mb-6">
      <div class="bg-b2 border border-brd rounded-xl p-4"><div class="text-xs text-tx2 mb-1">Total Revenue</div><div class="text-2xl font-bold font-mono text-accent">${fc(Math.round(rv))}</div></div>
      <div class="bg-b2 border border-brd rounded-xl p-4"><div class="text-xs text-tx2 mb-1">Completed Jobs</div><div class="text-2xl font-bold font-mono text-tx">${cp.length}</div></div>
      <div class="bg-b2 border border-brd rounded-xl p-4"><div class="text-xs text-tx2 mb-1">Avg. Job Value</div><div class="text-2xl font-bold font-mono text-tx">${cp.length ? fc(Math.round(rv / cp.length)) : '₹0'}</div></div>
      <div class="bg-b2 border border-brd rounded-xl p-4"><div class="text-xs text-tx2 mb-1">Active Jobs</div><div class="text-2xl font-bold font-mono text-info">${jobs.filter(j => j.st !== 'completed').length}</div></div>
    </div>
    <div class="bg-b2 border border-brd rounded-2xl p-6 mb-6">
      <h3 class="text-sm font-semibold text-tx mb-4">Revenue — Last 7 Days</h3>
      <div class="flex items-end gap-3 h-48 overflow-x-auto">${days.map(d => `<div class="flex-1 min-w-[72px] flex flex-col items-center gap-1"><div class="text-[10px] font-mono text-accent">${d.rev > 0 ? fc(Math.round(d.rev)) : '—'}</div><div class="w-full rounded-t-lg" style="height:${Math.max(4, d.rev / mx * 100)}%;background:linear-gradient(to top,#f97316,#fb923c)"></div><div class="text-[10px] text-tx2">${d.date}</div><div class="text-[10px] font-mono text-tx2">${d.jobs} jobs</div></div>`).join('')}</div>
    </div>
    <div class="grid lg:grid-cols-2 gap-4">
      <div class="bg-b2 border border-brd rounded-2xl p-5">
        <h3 class="text-sm font-semibold text-tx mb-3">Job Status</h3>
        <div class="space-y-3">${['waiting', 'in-progress', 'ready', 'completed'].map(s => {
          const cnt = jobs.filter(j => j.st === s).length;
          const pct = jobs.length ? Math.round(cnt / jobs.length * 100) : 0;
          const cl = {waiting:'bg-warn', 'in-progress':'bg-info', ready:'bg-ok', completed:'bg-purple-500'}[s];
          return `<div><div class="flex items-center justify-between mb-1"><span class="text-xs text-tx capitalize">${s.replace('-', ' ')}</span><span class="text-xs font-mono text-tx2">${cnt} (${pct}%)</span></div><div class="h-2 bg-b4 rounded-full overflow-hidden"><div class="${cl} h-full rounded-full" style="width:${pct}%"></div></div></div>`;
        }).join('')}</div>
      </div>
      <div class="bg-b2 border border-brd rounded-2xl p-5">
        <h3 class="text-sm font-semibold text-tx mb-3">Inventory Alerts</h3>
        <div class="space-y-2">${INV.filter(t => t.stk <= 4).map(t => `<div class="flex items-center justify-between text-xs"><span class="text-tx">${t.sz} ${t.mdl}</span><span class="font-mono ${t.stk <= 2 ? 'text-err' : 'text-warn'}">${t.stk} left</span></div>`).join('')}${INV.every(t => t.stk > 4) ? '<div class="text-center py-4 text-tx2 text-xs">All stock healthy</div>' : ''}</div>
      </div>
    </div>
  </div>`;
}

document.getElementById('mc').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const act = btn.dataset.action;
  const id = btn.dataset.id;

  if (act === 'navDash') return nav('dashboard');
  if (act === 'startJC') {
    S.memo = btn.dataset.memo === '1';
    S.step = 1;
    S.nj = makeNewJob();
    S.selTyre = null;
    S.tq = 1;
    return nav('job-create');
  }
  if (act === 'viewJ' || act === 'viewJHist') {
    S.ej = jobs.find(j => j.id == id);
    document.getElementById('modal').innerHTML = '';
    return nav('job-detail');
  }
  if (act === 'mvJ') {
    const j = jobs.find(x => x.id == id);
    if (!j) return;
    const so = ['waiting', 'in-progress', 'ready', 'completed'];
    const ni = so.indexOf(j.st) + parseInt(btn.dataset.dir, 10);
    if (ni >= 0 && ni <= 3) {
      j.st = so[ni];
      toast(`Job #${id} → ${j.st.replace('-', ' ')}`);
    }
    return render();
  }
  if (act === 'mvJD') {
    const j = jobs.find(x => x.id == id);
    if (!j) return;
    const so = ['waiting', 'in-progress', 'ready', 'completed'];
    const ni = so.indexOf(j.st) + 1;
    if (ni <= 3) {
      j.st = so[ni];
      toast(`Job #${id} → ${j.st.replace('-', ' ')}`);
    }
    S.ej = j;
    return render();
  }
  if (act === 'backS1') {
    S.step = 1;
    return render();
  }
  if (act === 'goS2') {
    const n = S.nj;
    n.nm = document.getElementById('jNm')?.value || n.nm;
    n.ph = document.getElementById('jPh')?.value || n.ph;
    n.veh = document.getElementById('jVeh')?.value || n.veh;
    n.reg = (document.getElementById('jReg')?.value || n.reg).toUpperCase();
    n.km = document.getElementById('jKm')?.value || n.km;
    if (!S.memo && (!n.nm.trim() || !n.ph.trim() || n.ph.length < 10)) return toast('Name and valid phone required', 'err');
    if (!n.veh.trim() || !n.reg.trim()) return toast('Vehicle and registration required', 'err');
    if (!n.cid && n.nm) {
      const ex = custs.find(c => c.ph === n.ph);
      if (!ex) {
        const nc = {id:nxC++, name:n.nm, ph:n.ph, veh:n.veh, reg:n.reg, km:parseInt(n.km, 10) || 0};
        custs.push(nc);
        n.cid = nc.id;
      } else {
        n.cid = ex.id;
      }
    }
    S.step = 2;
    return render();
  }
  if (act === 'tSvc') {
    S.nj.svc[id].en = !S.nj.svc[id].en;
    return render();
  }
  if (act === 'sCfg') {
    S.nj.svc[btn.dataset.id][btn.dataset.k] = btn.dataset.v === '0' ? false : btn.dataset.v === '1' ? true : btn.dataset.v;
    return render();
  }
  if (act === 'sCfgN') {
    const cfg = S.nj.svc[btn.dataset.id];
    cfg.count = Math.max(0, (cfg.count || 0) + parseInt(btn.dataset.d, 10));
    return render();
  }
  if (act === 'sCfgM') {
    S.nj.svc[btn.dataset.id].mech = btn.value;
    return;
  }
  if (act === 'tPos') {
    const arr = S.nj.svc[btn.dataset.id].positions;
    const p = btn.dataset.p;
    const i = arr.indexOf(p);
    if (i >= 0) arr.splice(i, 1);
    else arr.push(p);
    return render();
  }
  if (act === 'aAS') {
    S.nj.addS.push({name:'', price:0, qty:1});
    return render();
  }
  if (act === 'rAS') {
    S.nj.addS.splice(btn.dataset.i, 1);
    return render();
  }
  if (act === 'uASq') {
    const a = S.nj.addS[btn.dataset.i];
    a.qty = Math.max(1, a.qty + parseInt(btn.dataset.d, 10));
    return render();
  }
  if (act === 'fMod') {
    const s = document.getElementById('tSz').value;
    const m = document.getElementById('tMd');
    m.innerHTML = '<option value="">Select model</option>';
    document.getElementById('tMf').innerHTML = '<option value="">Select manufacturer</option>';
    document.getElementById('tPB').classList.add('hidden');
    if (!s) return;
    [...new Set(INV.filter(t => t.sz === s).map(t => t.mdl))].forEach(x => {
      const o = document.createElement('option');
      o.textContent = x;
      m.appendChild(o);
    });
    S.selTyre = null;
    S.tq = 1;
    return;
  }
  if (act === 'fMfg') {
    const s = document.getElementById('tSz').value;
    const md = document.getElementById('tMd').value;
    const m = document.getElementById('tMf');
    m.innerHTML = '<option value="">Select manufacturer</option>';
    document.getElementById('tPB').classList.add('hidden');
    if (!md) return;
    [...new Set(INV.filter(t => t.sz === s && t.mdl === md).map(t => t.mfg))].forEach(x => {
      const o = document.createElement('option');
      o.textContent = x;
      m.appendChild(o);
    });
    S.selTyre = null;
    S.tq = 1;
    return;
  }
  if (act === 'uTP') {
    const s = document.getElementById('tSz').value;
    const md = document.getElementById('tMd').value;
    const mf = document.getElementById('tMf').value;
    if (!s || !md || !mf) {
      document.getElementById('tPB').classList.add('hidden');
      return;
    }
    const t = INV.find(x => x.sz === s && x.mdl === md && x.mfg === mf);
    if (!t) {
      document.getElementById('tPB').classList.add('hidden');
      return;
    }
    document.getElementById('tPB').classList.remove('hidden');
    document.getElementById('tPr').textContent = fc(t.pr);
    document.getElementById('tSt').textContent = t.stk;
    S.tq = 1;
    document.getElementById('tQy').textContent = '1';
    S.selTyre = t;
    const ij = S.nj.tyres.filter(x => x.id === t.id).reduce((sum, x) => sum + x.qty, 0);
    document.getElementById('tAf').textContent = 'After: ' + (t.stk - ij - S.tq) + ' avail';
    return;
  }
  if (act === 'cTQ') {
    S.tq = Math.max(1, Math.min(S.tq + parseInt(btn.dataset.d, 10), (S.selTyre?.stk || 99)));
    document.getElementById('tQy').textContent = S.tq;
    if (S.selTyre) {
      const ij = S.nj.tyres.filter(x => x.id === S.selTyre.id).reduce((sum, x) => sum + x.qty, 0);
      document.getElementById('tAf').textContent = 'After: ' + (S.selTyre.stk - ij - S.tq) + ' avail';
    }
    return;
  }
  if (act === 'addTy') {
    if (!S.selTyre) return;
    const t = S.selTyre;
    const existing = S.nj.tyres.find(x => x.id === t.id);
    if (existing) existing.qty += S.tq;
    else S.nj.tyres.push({...t, qty:S.tq});
    toast(`Added ${S.tq}× ${t.sz} ${t.mdl}`);
    return render();
  }
  if (act === 'rmTy') {
    S.nj.tyres.splice(btn.dataset.i, 1);
    return render();
  }
  if (act === 'togRec') {
    if (isR) stopR();
    else startR();
    return;
  }
  if (act === 'playR') {
    const r = S.nj.recs[btn.dataset.i];
    if (r) new Audio(r.url).play();
    return;
  }
  if (act === 'delR') {
    S.nj.recs.splice(btn.dataset.i, 1);
    return render();
  }
  if (act === 'saveJ' || act === 'confJ') {
    const j = S.nj;
    j.notes = document.getElementById('jNotes')?.value || '';
    if (act === 'confJ') {
      const hs = Object.values(j.svc).some(v => v && v.en);
      if (!hs && !j.tyres.length && !j.addS.length) return toast('Add at least one service or tyre', 'err');
    }
    const es = Object.entries(j.svc).filter(([, v]) => v && v.en).map(([k]) => k);
    const savedSvcCfg = {};
    es.forEach(k => { savedSvcCfg[k] = {...j.svc[k], positions:[...(j.svc[k].positions || [])]}; });
    const mc = primaryMechanic(j);
    if (!j.cid && j.nm) {
      const ex = custs.find(c => c.ph === j.ph);
      if (!ex) {
        const nc = {id:nxC++, name:j.nm, ph:j.ph, veh:j.veh, reg:j.reg, km:parseInt(j.km, 10) || 0};
        custs.push(nc);
        j.cid = nc.id;
      } else {
        j.cid = ex.id;
      }
    }
    const newJob = {
      id:nxJ++,
      cid:j.cid,
      st:'waiting',
      svcs:es,
      svcCfg:savedSvcCfg,
      tyres:j.tyres.map(t => ({...t})),
      mech:mc,
      notes:j.notes,
      at:new Date(),
      memo:S.memo,
      veh:j.veh,
      reg:j.reg,
      addS:j.addS.map(a => ({...a})),
      recs:j.recs.map(r => ({...r}))
    };
    jobs.push(newJob);
    toast(act === 'confJ' ? 'Job confirmed' : (btn.dataset.est === '1' ? 'Estimate generated' : 'Draft saved'));
    if (btn.dataset.est === '1') {
      S.ej = newJob;
      newJob.invId = 'EST-' + Date.now().toString(36).toUpperCase();
      newJob.invAt = new Date();
      newJob.docType = 'estimate';
      return nav('invoice');
    }
    return nav('dashboard');
  }
  if (act === 'modEstimate') {
    if (S.ej) return nav('job-detail', {ej:S.ej});
    return nav('dashboard');
  }
  if (act === 'sendApproval') {
    const job = jobs.find(x => x.id == id);
    if (job) job.approvalSentAt = new Date();
    toast('Estimate sent for approval', 'ok');
    return nav('dashboard');
  }
  if (act === 'genInv') {
    const j = jobs.find(x => x.id == id);
    if (!j) return;
    j.st = 'completed';
    j.invId = 'INV-' + Date.now().toString(36).toUpperCase();
    j.invAt = new Date();
    j.docType = 'invoice';
    S.ej = j;
    return nav('invoice');
  }
  if (act === 'payModal') {
    const j = jobs.find(x => x.id == id);
    if (!j) return;
    const tot = calc(j).tot;
    document.getElementById('modal').innerHTML = `<div class="mover" data-action="clModalBg"><div class="bg-b2 border border-brd rounded-2xl p-6 w-[440px] max-w-full"><div class="flex items-center justify-between mb-4"><h3 class="text-lg font-bold text-tx">Process Payment</h3><button data-action="clModal" class="text-tx2 hover:text-tx"><i class="fas fa-times"></i></button></div><div class="text-center py-4"><div class="text-sm text-tx2">Amount Due</div><div class="text-3xl font-bold font-mono text-accent mt-1">${fc(Math.round(tot))}</div></div><div class="space-y-3 mb-4"><div><label class="text-xs text-tx2 mb-1 block">Payment Method</label><select class="inf text-sm" id="pMth"><option>Cash</option><option>UPI</option><option>Card</option><option>Bank Transfer</option></select></div><div><label class="text-xs text-tx2 mb-1 block">Amount Received</label><input type="number" class="inf text-sm font-mono" id="pAmt" value="${Math.round(tot)}"></div></div><button class="bp w-full" data-action="compPay" data-id="${j.id}"><i class="fas fa-check mr-2"></i>Complete Payment</button></div></div>`;
    return;
  }
  if (act === 'clModal' || act === 'clModalBg') {
    if (act === 'clModalBg' && e.target !== btn) return;
    document.getElementById('modal').innerHTML = '';
    return;
  }
  if (act === 'compPay') {
    const j = jobs.find(x => x.id == id);
    if (j) {
      j.paid = true;
      j.payMeth = document.getElementById('pMth')?.value || 'Cash';
      j.amtRcvd = parseFloat(document.getElementById('pAmt')?.value || calc(j).tot);
    }
    document.getElementById('modal').innerHTML = '';
    toast('Payment completed');
    return nav('dashboard');
  }
  if (act === 'siModal') {
    document.getElementById('modal').innerHTML = `<div class="mover" data-action="clModalBg"><div class="bg-b2 border border-brd rounded-2xl p-6 w-[440px] max-w-full"><div class="flex items-center justify-between mb-4"><h3 class="text-lg font-bold text-tx">Stock In</h3><button data-action="clModal" class="text-tx2 hover:text-tx"><i class="fas fa-times"></i></button></div><div class="space-y-3"><div><label class="text-xs text-tx2 mb-1 block">Tyre</label><select class="inf text-sm" id="siI">${INV.map(t => `<option value="${t.id}">${t.sz} ${t.mdl} (${t.mfg})</option>`).join('')}</select></div><div><label class="text-xs text-tx2 mb-1 block">Quantity</label><input type="number" class="inf text-sm font-mono" id="siQ" value="1" min="1"></div></div><button class="bp w-full mt-4" data-action="doSI"><i class="fas fa-plus mr-2"></i>Add Stock</button></div></div>`;
    return;
  }
  if (act === 'doSI') {
    const invId = parseInt(document.getElementById('siI').value, 10);
    const q = parseInt(document.getElementById('siQ').value, 10) || 0;
    const t = INV.find(x => x.id === invId);
    if (t && q > 0) t.stk += q;
    document.getElementById('modal').innerHTML = '';
    toast(`Added ${q} units`);
    return render();
  }
  if (act === 'cHist') {
    const c = custs.find(x => x.id == id);
    if (!c) return;
    const cj = jobs.filter(j => j.cid === c.id);
    document.getElementById('modal').innerHTML = `<div class="mover" data-action="clModalBg"><div class="bg-b2 border border-brd rounded-2xl p-6 w-[560px] max-h-[80vh] overflow-y-auto max-w-full"><div class="flex items-center justify-between mb-4"><div><h3 class="text-lg font-bold text-tx">${c.name}</h3><p class="text-sm text-tx2">${c.ph} · ${c.veh}</p></div><button data-action="clModal" class="text-tx2 hover:text-tx"><i class="fas fa-times"></i></button></div><h4 class="text-sm font-semibold text-tx2 mb-2">History (${cj.length})</h4><div class="space-y-2">${cj.length === 0 ? '<div class="text-center py-6 text-tx2 text-xs">No jobs</div>' : cj.map(j => `<div class="bg-b3 rounded-xl p-3 flex items-center justify-between cursor-pointer hover:bg-b4" data-action="viewJHist" data-id="${j.id}"><div><div class="text-sm font-medium text-tx">Job #${j.id}</div><div class="text-xs text-tx2">${fd(j.at)}</div></div><div class="text-right"><span class="bdg bdg-${j.st}">${j.st}</span><div class="text-xs font-mono text-accent mt-1">${fc(Math.round(calc(j).tot))}</div></div></div>`).join('')}</div></div></div>`;
    return;
  }
  if (act === 'pickC') {
    const c = custs.find(x => x.id == id);
    if (c) {
      S.nj.cid = c.id;
      S.nj.nm = c.name;
      S.nj.ph = c.ph;
      S.nj.veh = c.veh;
      S.nj.reg = c.reg;
      S.nj.km = c.km;
      render();
    }
  }
});

document.getElementById('mc').addEventListener('change', function(e) {
  const el = e.target;
  if (el.dataset.action === 'uAS') {
    const i = parseInt(el.dataset.i, 10);
    if (el.dataset.k === 'name') S.nj.addS[i].name = el.value;
    if (el.dataset.k === 'price') S.nj.addS[i].price = parseFloat(el.value) || 0;
  }
  if (el.dataset.action === 'sCfgM') {
    S.nj.svc[el.dataset.id].mech = el.value;
  }
});

document.getElementById('sideNav').addEventListener('click', function(e) {
  const item = e.target.closest('.sb-item');
  if (!item) return;
  nav(item.dataset.v);
});

document.querySelector('.mobnav').addEventListener('click', function(e) {
  const item = e.target.closest('[data-v]');
  if (!item) return;
  nav(item.dataset.v);
});

document.getElementById('gSearch').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  const sr = document.getElementById('gResults');
  if (q.length < 2) {
    sr.classList.add('hidden');
    return;
  }
  const r = custs.filter(c => c.name.toLowerCase().includes(q) || c.ph.includes(q) || c.reg.toLowerCase().includes(q));
  if (!r.length) {
    sr.classList.add('hidden');
    return;
  }
  sr.classList.remove('hidden');
  sr.innerHTML = r.map(c => `<div class="px-4 py-3 hover:bg-b4 cursor-pointer text-sm" data-action="gSrcC" data-id="${c.id}"><span class="text-tx font-medium">${c.name}</span> <span class="text-tx2 text-xs ml-2">${c.ph} · ${c.reg}</span></div>`).join('');
});

document.getElementById('gResults').addEventListener('click', function(e) {
  const item = e.target.closest('[data-action="gSrcC"]');
  if (!item) return;
  const job = jobs.find(j => j.cid == item.dataset.id);
  if (job) {
    S.ej = job;
    nav('job-detail');
  } else {
    toast('No jobs found for this customer', 'info');
  }
  document.getElementById('gSearch').value = '';
  this.classList.add('hidden');
});

document.addEventListener('click', function(e) {
  if (!e.target.closest('#gSearch') && !e.target.closest('#gResults')) document.getElementById('gResults')?.classList.add('hidden');
  if (!e.target.closest('#cSrc') && !e.target.closest('#cDrop')) document.getElementById('cDrop')?.classList.add('hidden');
});

function srcC(q) {
  const d = document.getElementById('cDrop');
  if (!q || q.length < 2) {
    d.classList.add('hidden');
    return;
  }
  const r = custs.filter(c => c.name.toLowerCase().includes(q.toLowerCase()) || c.ph.includes(q));
  if (!r.length) {
    d.classList.add('hidden');
    return;
  }
  d.classList.remove('hidden');
  d.innerHTML = r.map(c => `<div class="px-4 py-3 hover:bg-b4 cursor-pointer" data-action="pickC" data-id="${c.id}"><div class="text-sm font-medium text-tx">${c.name}</div><div class="text-xs text-tx2">${c.ph} · ${c.veh} · ${c.reg}</div></div>`).join('');
}

let mRec = null, rChks = [], rSt = 0, isR = false;
function startR() {
  navigator.mediaDevices.getUserMedia({audio:true}).then(st => {
    mRec = new MediaRecorder(st);
    rChks = [];
    mRec.ondataavailable = e => rChks.push(e.data);
    mRec.onstop = () => {
      const d = Math.round((Date.now() - rSt) / 1000);
      const u = URL.createObjectURL(new Blob(rChks, {type:'audio/webm'}));
      S.nj.recs.push({url:u, dur:d});
      st.getTracks().forEach(t => t.stop());
      isR = false;
      render();
      toast('Recording saved');
    };
    mRec.start();
    rSt = Date.now();
    isR = true;
    const b = document.getElementById('recBtn');
    if (b) b.innerHTML = '<span class="rdot inline-block w-2 h-2 rounded-full bg-err mr-1"></span>Stop';
  }).catch(() => toast('Mic access denied', 'err'));
}

function stopR() {
  if (mRec && mRec.state === 'recording') mRec.stop();
}

setInterval(() => {
  const e = document.getElementById('clock');
  if (e) e.textContent = new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}, 1000);

document.getElementById('branchSel').addEventListener('change', e => toast('Switched to ' + e.target.value, 'info'));

render();
</script>
</body>
</html>
